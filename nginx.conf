worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Brotli Compression
    brotli on;
    brotli_comp_level 5;
    brotli_buffers 16 8k;
    brotli_min_length 256;
    brotli_types application/atom+xml application/javascript application/json application/rss+xml \
                   application/vnd.ms-fontobject application/x-font-opentype application/x-font-truetype \
                   application/x-font-ttf application/x-javascript application/xhtml+xml application/xml \
                   font/eot font/opentype font/otf font/truetype image/svg+xml image/x-icon \
                   image/webp text/css text/javascript text/plain text/xml;

    # Gzip Compression (as fallback if Brotli is not supported by client)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types application/atom+xml application/javascript application/json application/rss+xml \
               application/vnd.ms-fontobject application/x-font-opentype application/x-font-truetype \
               application/x-font-ttf application/x-javascript application/xhtml+xml application/xml \
               font/eot font/opentype font/otf font/truetype image/svg+xml image/x-icon \
               image/webp text/css text/javascript text/plain text/xml;

    server {
        listen 80;
        listen [::]:80;
        server_name localhost; # Replace with your domain name

        root /usr/share/nginx/html;
        index index.html index.htm;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache Control for Static Assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # SSE endpoint — disable buffering for streaming
        location /api/import/supplier-colors/stream {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            chunked_transfer_encoding off;
        }

        # Proxy API → Backend
        location /api/ {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Proxy Supabase (LAN access)
        location /supabase/ {
            proxy_pass http://host.docker.internal:55421/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location /health {
            proxy_pass http://backend:3000;
            proxy_set_header Host $host;
        }
    }
}
